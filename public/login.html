<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Vendor Payment System</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.logo { text-align: center; margin-bottom: 28px; }
.logo .icon { font-size: 42px; }
.logo h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; margin-top: 8px; }
.logo p  { font-size: 13px; color: #888; margin-top: 4px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.form-group input {
  width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s;
}
.form-group input:focus { border-color: #3a3a7c; }
.btn {
  width: 100%; padding: 13px; background: #1a1a2e; color: #ffd166;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background .2s; letter-spacing: .5px;
}
.btn:hover { background: #2a2a4e; }
.btn:disabled { background: #aaa; cursor: not-allowed; }
.error {
  background: #fff0f0; border: 1px solid #f5c6cb; color: #c0392b;
  border-radius: 8px; padding: 10px 14px; font-size: 13px;
  margin-bottom: 16px; display: none;
}
.links { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
.links a { color: #3a3a7c; text-decoration: none; font-weight: 600; }
.links a:hover { text-decoration: underline; }
.divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
.divider hr { flex:1; border: none; border-top: 1px solid #eee; }
.divider span { font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="icon">📋</div>
    <h1>Vendor Payment System</h1>
    <p>Sign in to access the data entry panel</p>
  </div>

  <div class="error" id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
    </div>
    <button type="submit" class="btn" id="login-btn">Sign In</button>
  </form>

  <div class="divider"><hr><span>or</span><hr></div>

  <div class="links">
    <a href="/dashboard">📊 View Dashboard (no login needed)</a>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.style.display = 'none';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/entry';
    } else {
      errEl.textContent = data.error || 'Login failed';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(err) {
    errEl.textContent = 'Connection error. Is the server running?';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});

// Auto-focus username
document.getElementById('username').focus();
</script>
</body>
</html>
